# ---------------------------------------------------------------------------
# Vivado Simulator + Synthesis Configuration
#
# Vivado is AMD/Xilinx's all-in-one tool: it can simulate (xvhdl/xelab/xsim)
# and synthesize (Vivado batch Tcl). This config covers both modes.
# ---------------------------------------------------------------------------

[tool]
name = "Vivado"
vendor = "AMD/Xilinx"
type = "both"
description = "Xilinx Vivado Design Suite — simulator (xsim) and synthesizer"

[paths]
environment_variable = "XILINX_VIVADO"
search_paths = [
    "C:/Xilinx/Vivado/*/bin",
    "/opt/Xilinx/Vivado/*/bin",
]
windows_default = "C:/Xilinx/Vivado/2024.1/bin"
linux_default = "/opt/Xilinx/Vivado/2024.1/bin"

# ---------------------------------------------------------------------------
# VHDL standard flags
# ---------------------------------------------------------------------------
[standards.vhdl2008]
analysis_flags = ["-2008"]

[standards.vhdl2019]
analysis_flags = ["-2019"]
# Note: Vivado's VHDL-2019 support is limited. This flag may not exist in all versions.

# ---------------------------------------------------------------------------
# Simulation mode
# ---------------------------------------------------------------------------
[sim]
# Step 1: Analyze (compile) the VHDL file
analysis_cmd = "xvhdl"
analysis_flags = ["-work", "work", "--nolog"]
analysis_error_pattern = "(ERROR|Error|error):"

# Step 2: Elaborate the top-level entity
# The runner extracts the entity name from the test file.
elaboration_cmd = "xelab"
elaboration_flags = ["-debug", "typical", "--nolog"]
elaboration_error_pattern = "(ERROR|Error|error):"

# Step 3: Run simulation
run_cmd = "xsim"
run_flags = ["-R", "--nolog"]
run_pass_pattern = "PASS:"
run_fail_pattern = "FAIL:"
run_timeout_seconds = 30

# ---------------------------------------------------------------------------
# Synthesis mode
#
# Vivado synthesis uses batch Tcl scripts. The runner generates a Tcl script
# that invokes read_vhdl and synth_design, then checks for errors.
# ---------------------------------------------------------------------------
[synth]
method = "tcl_batch"
vivado_cmd = "vivado"
batch_flags = ["-mode", "batch", "-source", "{tcl_script}", "-notrace", "--nolog"]
# The runner writes a Tcl script with these commands:
tcl_template = """
# Auto-generated by VHDL Compatibility Test Suite
# Target: {entity_name} from {vhdl_file}
set_msg_config -suppress -severity WARNING
read_vhdl {vhdl_flags} {vhdl_file}
synth_design -top {entity_name} -part {part}
if {{[get_msg_config -count -severity ERROR] > 0}} {{
    puts "SYNTH_ERROR: Synthesis had errors"
    exit 1
}}
puts "SYNTH_PASS: Synthesis completed successfully"
exit 0
"""
part = "xc7k70t-fbg676-1"
synth_error_pattern = "SYNTH_ERROR:"
synth_pass_pattern = "SYNTH_PASS:"
synth_timeout_seconds = 120
