# ============================================================================
# Manually declared EDA tool installations.
#
# Copy this file to: tools/installed.toml
# Edit the paths to match your system.
#
# installed.toml is gitignored — each developer maintains their own copy.
# This file takes priority over automatic detection (vhdl-compat --detect).
# ============================================================================

# ---------------------------------------------------------------------------
# Vivado (AMD/Xilinx) — simulation + synthesis
# ---------------------------------------------------------------------------
# ["Vivado"]
# version = "2024.1"
# alias = "v24"       # optional: short name for --version
# path = "C:/Xilinx/Vivado/2024.1/bin"
#
# ["Vivado"]
# version = "2023.2"
# path = "C:/Xilinx/Vivado/2023.2/bin"

# ---------------------------------------------------------------------------
# Questa Advanced Simulator (Siemens EDA)
# ---------------------------------------------------------------------------
# ["Altera Questa Starter"]
# version = "2025.3"
# alias = "questa"     # optional: short name for --version
# path = "C:/questa_fse/win64"

# ---------------------------------------------------------------------------
# ModelSim DE/PE (Siemens EDA)
# ---------------------------------------------------------------------------
# ["Altera ModelSim Starter"]
# version = "2020.1"
# alias = "modelsim"    # optional: short name for --version
# path = "C:/modelsim_ase/win32aloem"

# ---------------------------------------------------------------------------
# GHDL — open-source VHDL simulator
# ---------------------------------------------------------------------------
# [ghdl."4.0"]
# path = "/usr/local/bin"

# ---------------------------------------------------------------------------
# NVC — open-source VHDL compiler/simulator
# ---------------------------------------------------------------------------
# [nvc."1.21"]
# path = "/usr/local/bin"
